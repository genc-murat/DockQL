# Deploy cargo doc + docs/ to GitHub Pages
#
# Required repository setup:
#   Settings → Pages → Source: "GitHub Actions"

name: Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build Rust API docs
        run: cargo doc --no-deps --all-features

      - name: Create redirect index.html
        run: |
          echo '<meta http-equiv="refresh" content="0; url=./dol/index.html">' > target/doc/index.html

      - name: Install pandoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq pandoc

      - name: Convert docs markdown to HTML
        run: |
          for f in docs/*.md; do
            name=$(basename "$f" .md)
            [ "$name" = "pandoc-template" ] && continue
            pandoc "$f" -o "target/doc/${name}.html" \
              --from markdown --to html5 --standalone \
              --template docs/pandoc-template.html
          done

      - name: Copy pandoc template to output
        run: cp docs/pandoc-template.html target/doc/ 2>/dev/null || true

      - name: Copy static docs assets
        run: cp docs/*.html target/doc/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
